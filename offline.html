<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFly - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #5C7A1F 0%, #8AAB3A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .retry-btn {
            background: #5C7A1F;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        .retry-btn:hover {
            background: #6B8E23;
            transform: translateY(-2px);
        }
        
        .retry-btn:active {
            transform: translateY(0);
        }
        
        .features {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .features h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .feature {
            background: #f5f5f5;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🌐</div>
        <h1>You're Offline</h1>
        <p>Don't worry! PDFly will work once your internet connection is restored.</p>
        
        <button class="retry-btn" onclick="location.reload()">
            🔄 Try Again
        </button>
        
        <div class="features">
            <h3>Features available when online:</h3>
            <div class="feature-list">
                <span class="feature">📄 Image to PDF</span>
                <span class="feature">💧 Watermark</span>
                <span class="feature">🔒 Password Protection</span>
                <span class="feature">🔄 Page Reordering</span>
                <span class="feature">⚡ Fast Conversion</span>
            </div>
        </div>
    </div>
    
    <script>
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
